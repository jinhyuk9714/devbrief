spring:
  datasource:
    url: jdbc:h2:file:./data/devbrief;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: devbrief
    password: devbrief
  jpa:
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: localhost
      port: 6379

devbrief:
  ingestion:
    network-enabled: false
  demo:
    seed-on-startup: true

spring:
  datasource:
    url: jdbc:h2:mem:devbrief;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
  data:
    redis:
      host: localhost
      port: 6399

devbrief:
  ingestion:
    network-enabled: false
  demo:
    seed-on-startup: false

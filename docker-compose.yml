services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: devbrief
      POSTGRES_USER: devbrief
      POSTGRES_PASSWORD: devbrief
    ports:
      - "5432:5432"
    volumes:
      - devbrief-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  devbrief-postgres:

